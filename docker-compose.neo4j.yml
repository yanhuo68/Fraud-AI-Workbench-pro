services:
  graphdb:
    image: neo4j:5.11.0
    container_name: fraud_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/import:/var/lib/neo4j/import
    environment:
      - NEO4J_AUTH=${GRAPH_STORE_USER:-neo4j}/${GRAPH_STORE_PASSWORD}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_server_bolt_advertised__address=fraud_neo4j:7687
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512M
    healthcheck:
      # neo4j:5.11.0 does not ship curl — use built-in 'neo4j status' command
      test: [ "CMD-SHELL", "neo4j status | grep -q 'running' || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    restart: unless-stopped
    networks:
      - fraud_network

networks:
  fraud_network:
    external: true
