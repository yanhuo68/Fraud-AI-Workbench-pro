services:
  fastapi:
    container_name: fraud_api
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PATH=/app/data/db/rag.db
      - MODEL_DIR=/app/models
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - GRAPH_STORE_URI=bolt://fraud_neo4j:7687
      - GRAPH_STORE_USER=${GRAPH_STORE_USER:-neo4j}
      - GRAPH_STORE_PASSWORD=${GRAPH_STORE_PASSWORD}
    networks:
      - fraud_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  streamlit:
    container_name: fraud_streamlit
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8504:8504"
    volumes:
      - .:/app
    depends_on:
      fastapi:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app/src
      - API_URL=http://fastapi:8000
      - STREAMLIT_SERVER_PORT=8504
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - GRAPH_STORE_URI=bolt://fraud_neo4j:7687
      - GRAPH_STORE_USER=${GRAPH_STORE_USER:-neo4j}
      - GRAPH_STORE_PASSWORD=${GRAPH_STORE_PASSWORD}
    networks:
      - fraud_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8504/_stcore/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  fraud_network:
    name: fraud_network
    driver: bridge
