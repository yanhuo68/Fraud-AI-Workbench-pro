name: CI Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-unit:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Run Unit Tests
      env:
        PYTHONPATH: "src"
      run: |
        pytest tests/unit/ -v --cov=src --cov-report=xml
        
  test-integration:
    name: Run Integration & E2E Tests
    runs-on: ubuntu-latest
    needs: test-unit # Only run if unit tests pass
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Create required .env file
      run: |
        cp .env.example .env
        echo "SECRET_KEY=github-action-test-key-12345" >> .env
        echo "GRAPH_STORE_PASSWORD=testpassword" >> .env
        echo "ADMIN_PASSWORD=admin" >> .env
        
    - name: Install test dependencies
      run: |
        pip install pytest requests
        
    - name: Start Docker Compose Stack
      run: |
        docker compose up -d
        
    - name: Wait for FastAPI backend to be ready
      run: |
        echo "Waiting for backend..."
        for i in {1..30}; do
          if curl -s http://localhost:8000/health > /dev/null; then
            echo "Backend is up!"
            exit 0
          fi
          echo "Waiting..."
          sleep 2
        done
        echo "Backend failed to start. Container logs:"
        docker logs fraud_api
        exit 1
        
    - name: Run Integration Tests
      env:
        PYTHONPATH: "src"
        API_BASE_URL: "http://localhost:8000"
      run: |
        pytest tests/integration/ -v
        
    - name: Run E2E Tests
      env:
        PYTHONPATH: "src"
        API_BASE_URL: "http://localhost:8000"
      run: |
        pytest tests/e2e/ -v
        
    - name: Stop Docker Compose Stack
      if: always()
      run: |
        docker compose down -v
