[pytest]
testpaths = tests
pythonpath = src
norecursedirs = tests/adhoc
addopts = -v --tb=short -ra
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Fast unit tests with no external service dependencies
    integration: Tests that use FastAPI TestClient against in-memory DB
    e2e: End-to-end smoke tests (use --runsmoke to include)
    slow: Tests that take more than 5 seconds
